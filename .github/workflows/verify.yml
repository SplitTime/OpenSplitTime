name: Verify
on:
  pull_request:

jobs:
  linters:
    name: Code integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: JS package cache
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list

      - name: Install packages
        run: |
          yarn install --pure-lockfile

      - name: Run security checks
        run: |
          bin/bundle-audit check --update

      - name: Run rubocop on changed files
        run: |
          # Get list of changed Ruby files from the PR
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files.[].path' | grep -E '\.(rb|rake)$|Rakefile$|Gemfile$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No Ruby files changed, skipping rubocop"
            exit 0
          fi
          
          echo "Running rubocop on changed files:"
          echo "$CHANGED_FILES"
          
          # Filter out deleted files
          EXISTING_FILES=$(echo "$CHANGED_FILES" | while read -r f; do [ -f "$f" ] && echo "$f"; done || true)

          if [ -z "$EXISTING_FILES" ]; then
            echo "No existing Ruby files to lint, skipping rubocop"
            exit 0
          fi

          # Run rubocop on changed files (pass them as arguments)
          echo "$EXISTING_FILES" | xargs bundle exec rubocop
        env:
          GH_TOKEN: ${{ github.token }}

  setup:
    name: Build and prepare assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: JS package cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install packages
        run: |
          yarn install --pure-lockfile

      - name: Compile assets
        env:
          RAILS_ENV: test
        run: |
          yarn build
          yarn build:css
          bundle exec rake assets:precompile

      - name: Upload compiled assets
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets
          path: |
            public/packs
            public/assets
          retention-days: 1

  tests:
    name: Tests (${{ matrix.test-group }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-group: [unit, system]
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports: [ "6379:6379" ]
        options: --entrypoint redis-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: JS package cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Download compiled assets
        uses: actions/download-artifact@v4
        with:
          name: compiled-assets
          path: .

      - name: Setup test database
        env:
          RAILS_ENV: test
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          bin/rails db:setup

      - name: Run unit tests
        if: matrix.test-group == 'unit'
        env:
          RAILS_ENV: test
          CI: true
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bin/rspec --exclude-pattern "spec/system/**/*_spec.rb"

      - name: Run system tests
        if: matrix.test-group == 'system'
        env:
          RAILS_ENV: test
          CI: true
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bin/rspec spec/system

      - name: Save capybara screenshots as artifact
        if: failure() && matrix.test-group == 'system'
        uses: actions/upload-artifact@v4
        with:
          name: capybara-failure-screenshots-${{ matrix.test-group }}
          path: tmp/capybara/*.png
