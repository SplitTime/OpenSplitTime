name: Verify
on:
  pull_request:

jobs:
  linters:
    name: Code integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: JS package cache
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list

      - name: Install packages
        run: |
          yarn install --pure-lockfile

      - name: Run security checks
        run: |
          bin/bundle-audit check --update

      - name: Run rubocop on changed files
        run: |
          # Get list of changed Ruby files from the PR
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files.[].path' | grep -E '\.(rb|rake)$|Rakefile$|Gemfile$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No Ruby files changed, skipping rubocop"
            exit 0
          fi

          echo "Running rubocop on changed files:"
          echo "$CHANGED_FILES"

          # Filter out deleted files
          EXISTING_FILES=$(echo "$CHANGED_FILES" | while read -r f; do [ -f "$f" ] && echo "$f"; done || true)

          if [ -z "$EXISTING_FILES" ]; then
            echo "No existing Ruby files to lint, skipping rubocop"
            exit 0
          fi

          # Run rubocop on changed files (pass them as arguments)
          echo "$EXISTING_FILES" | xargs bundle exec rubocop --force-exclusion
        env:
          GH_TOKEN: ${{ github.token }}

  build-assets:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: JS package cache
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list

      - name: Install packages
        run: |
          yarn install --pure-lockfile

      - name: Compile assets
        run: |
          yarn build
          yarn build:css

      - name: Upload assets
        uses: actions/upload-artifact@v7
        with:
          name: built-assets
          path: app/assets/builds/

  tests:
    name: Tests (${{ matrix.name }})
    needs: build-assets
    runs-on: ubuntu-latest
    env:
      # spec/system subdirectories explicitly assigned to browser1 runner
      BROWSER1_DIRS: >-
        devise
        event_group_construction
      # spec/system subdirectories explicitly assigned to browser2 runner
      # browser3 catches all other js specs including root-level js specs
      BROWSER2_DIRS: >-
        course_groups
        courses
        effort_audit
        effort_edit_split_times
        effort_show
        event_group_roster
        event_groups
        imports
        organization
        raw_times
        results
        subscriptions
        user_settings
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit and rack
            rspec_args: --tag ~js
          - name: browser1
          - name: browser2
          - name: browser3
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install libvips
        run: sudo apt-get install -y --no-install-recommends libvips42

      - name: Download assets
        uses: actions/download-artifact@v8
        with:
          name: built-assets
          path: app/assets/builds/

      - name: Check PostgreSQL version
        run: psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -c 'SELECT version();'
        env:
          PGPASSWORD: postgres

      - name: Setup test database
        env:
          RAILS_ENV: test
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          bin/rails db:setup

      - name: Run tests
        env:
          RAILS_ENV: test
          CI: true
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          case "${{ matrix.name }}" in
            browser1)
              INCLUDE=$(echo "$BROWSER1_DIRS" | tr -s ' ' '\n' | sed 's|.*|spec/system/&|' | tr '\n' ' ')
              bin/rspec --tag js $INCLUDE
              ;;
            browser2)
              INCLUDE=$(echo "$BROWSER2_DIRS" | tr -s ' ' '\n' | sed 's|.*|spec/system/&|' | tr '\n' ' ')
              bin/rspec --tag js $INCLUDE
              ;;
            browser3)
              EXCLUDE=$(echo "$BROWSER1_DIRS $BROWSER2_DIRS" | tr -s ' ' '\n' | sed 's|.*|spec/system/&/**/*_spec.rb|' | tr '\n' ',' | sed 's/,$//')
              bin/rspec --tag js --exclude-pattern "$EXCLUDE"
              ;;
            *)
              bin/rspec ${{ matrix.rspec_args }}
              ;;
          esac

      - name: Save capybara screenshots as artifact
        if: failure() && contains(matrix.name, 'browser')
        uses: actions/upload-artifact@v7
        with:
          name: capybara-failure-screenshots-${{ matrix.name }}
          path: tmp/capybara/*.png
