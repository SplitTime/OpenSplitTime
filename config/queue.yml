default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: solid_*  # Only process queues with 'solid_' prefix (parallel with Sidekiq)
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
