<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% seo %}
  
  <!-- Bootstrap 5.2.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ site.baseurl }}/">
        <strong>{{ site.title }}</strong>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="https://www.opensplittime.org">OpenSplitTime Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://github.com/SplitTime/OpenSplitTime">GitHub</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse" id="sidebarMenu">
        <div class="position-sticky pt-3">
          <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
            <span>Documentation</span>
          </h6>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/">
                <i class="bi bi-house-door"></i> Home
              </a>
            </li>
          </ul>
          
          <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
            <span>Sections</span>
          </h6>
          <ul class="nav flex-column mb-2">
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/getting-started/">
                <i class="bi bi-play-circle"></i> Getting Started
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/management/">
                <i class="bi bi-gear"></i> Managing an Event
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/ost-remote/">
                <i class="bi bi-phone"></i> OST Remote
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/api/">
                <i class="bi bi-code-slash"></i> API
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/user-info/">
                <i class="bi bi-person"></i> User Information
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main content -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="content-wrapper">
          {{ content }}
        </div>
        
        <!-- Footer -->
        <footer class="footer mt-5 py-3 border-top">
          <div class="container-fluid">
            <p class="text-muted mb-0">
              &copy; {{ 'now' | date: "%Y" }} OpenSplitTime | 
              <a href="https://github.com/SplitTime/OpenSplitTime">GitHub</a> | 
              <a href="mailto:mark@opensplittime.org">Contact</a>
            </p>
          </div>
        </footer>
      </main>
    </div>
  </div>

  <!-- Bootstrap 5.2.3 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
